name: Docker

on:
  # Only run after Release succeeds — ensures CI + Release passed first
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "version=$TAG" >> $GITHUB_OUTPUT
          if [ -z "$TAG" ]; then
            echo "::warning::No tag found — skipping Docker build"
          else
            echo "Building Docker image for $TAG"
          fi

      # Download pre-built .output/ from the CI workflow that preceded Release
      - name: Find CI run artifact
        if: steps.tag.outputs.version != ''
        id: find-artifact
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent successful CI run on main
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              per_page: 1
            });
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No successful CI run found');
              return;
            }
            const runId = runs.data.workflow_runs[0].id;
            core.setOutput('run-id', runId);
            console.log(`Found CI run ${runId}`);

      - name: Download build artifact
        if: steps.tag.outputs.version != '' && steps.find-artifact.outputs.run-id
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: .output
          run-id: ${{ steps.find-artifact.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.tag.outputs.version != ''
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.tag.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.tag.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        if: steps.tag.outputs.version != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.tag.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
